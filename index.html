<!DOCTYPE html>
<html>
<head>
    <title>Visible Transparent Glass</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; /* 改成深色背景，你才看得到白色透明物件 */
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        canvas { 
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="glassCanvas"></canvas>

<script>
const canvas = document.getElementById('glassCanvas');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let time = 0;

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 繪製一些背景裝飾，用來測試透明感
    ctx.fillStyle = '#333';
    for(let i=0; i<canvas.width; i+=50) {
        ctx.fillRect(i, 0, 1, canvas.height);
        ctx.fillRect(0, i, canvas.width, 1);
    }

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;
    const points = 12;
    const baseRadius = 180;

    ctx.beginPath();
    for (let i = 0; i <= points; i++) {
        const angle = (i / points) * Math.PI * 2;
        const offset = Math.sin(time + i * 0.5) * 40;
        const r = baseRadius + offset;
        const x = centerX + Math.cos(angle) * r;
        const y = centerY + Math.sin(angle) * r;

        if (i === 0) ctx.moveTo(x, y);
        else {
            const prevAngle = ((i - 1) / points) * Math.PI * 2;
            const prevOffset = Math.sin(time + (i - 1) * 0.5) * 40;
            const px = centerX + Math.cos(prevAngle) * (baseRadius + prevOffset);
            const py = centerY + Math.sin(prevAngle) * (baseRadius + prevOffset);
            const cx = (px + x) / 2;
            const cy = (py + y) / 2;
            ctx.quadraticCurveTo(px, py, cx, cy);
        }
    }

    // 透明度設定：讓它像空氣一樣，但有光澤
    const grad = ctx.createRadialGradient(centerX-50, centerY-50, 0, centerX, centerY, baseRadius+50);
    grad.addColorStop(0, 'rgba(255, 255, 255, 0.1)'); // 極淡白
    grad.addColorStop(1, 'rgba(100, 200, 255, 0.05)'); // 極淡藍
    
    ctx.fillStyle = grad;
    ctx.fill();

    // 邊緣亮線
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    time += 0.02;
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
