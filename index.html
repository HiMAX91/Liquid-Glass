<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>無水印・完美幾何折射</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #111; margin: 0; overflow: hidden; touch-action: none; }
    
    /* 城市街道背景 */
    .bg-complex-image {
      position: absolute; inset: -5%; width: 110%; height: 110%;
      background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');
      background-size: cover; background-position: center; z-index: -3;
    }

    /* 玻璃容器 */
    .glass-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border-radius: 40px;
      overflow: hidden; 
      cursor: grab;
      background: rgba(255,255,255,0.01);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }
    .glass-container:active { cursor: grabbing; }

    /* 扭曲層 */
    .glass-effect {
      position: absolute; inset: 0;
      backdrop-filter: url(#true-lens) saturate(120%);
      -webkit-backdrop-filter: url(#true-lens) saturate(120%);
    }

    /* 極細無暇邊框 */
    .glass-frame {
      position: absolute; inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <svg class="hidden absolute w-0 h-0 pointer-events-none">
    <filter id="true-lens" x="-50%" y="-50%" width="200%" height="200%">
      <feImage id="lens-map" x="25%" y="25%" width="50%" height="50%" preserveAspectRatio="none" result="map" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="-80" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="bg-complex-image"></div>

  <div id="drag-glass" class="glass-container">
    <div class="glass-effect"></div>
    <div class="glass-frame"></div>
  </div>

  <script>
    // 產生完美的球面數學位移圖
    function generatePerfectLensMap(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(size, size);
      
      const cx = size / 2;
      const cy = size / 2;

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const dx = x - cx;
          const dy = y - cy;
          
          const nx = dx / cx; 
          const ny = dy / cy; 
          
          const dist = Math.sqrt(nx*nx + ny*ny);
          
          // 平滑的凸透鏡拉扯曲線
          let pull = Math.sin(dist * Math.PI / 2); 
          if(dist > 1) pull = 1; // 安全鎖定在極限範圍內，防止破圖

          let r = (nx * pull * 0.5 + 0.5) * 255;
          let g = (ny * pull * 0.5 + 0.5) * 255;

          const i = (y * size + x) * 4;
          imgData.data[i] = Math.min(Math.max(r, 0), 255);
          imgData.data[i+1] = Math.min(Math.max(g, 0), 255);
          imgData.data[i+2] = 128; 
          imgData.data[i+3] = 255; 
        }
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL();
    }

    // 將算好的地圖塞入濾鏡
    document.getElementById('lens-map').setAttribute('href', generatePerfectLensMap(300));

    // 拖曳邏輯
    const glass = document.getElementById('drag-glass');
    let isDragging = false, startX, startY, initialX, initialY;

    function getTranslateValues(element) {
      const style = window.getComputedStyle(element);
      const matrix = new DOMMatrixReadOnly(style.transform);
      return { x: matrix.m41, y: matrix.m42 };
    }

    function onStart(e) {
      isDragging = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const { x, y } = getTranslateValues(glass);
      startX = clientX; startY = clientY; initialX = x; initialY = y;
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      glass.style.transform = `translate(${initialX + (clientX - startX)}px, ${initialY + (clientY - startY)}px)`;
    }

    function onEnd() { isDragging = false; }

    glass.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    glass.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  </script>
</body>
</html>
