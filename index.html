<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>極限幾何・絕對透鏡</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; margin: 0; overflow: hidden; touch-action: none; }
    
    .bg-complex-image {
      position: absolute; inset: -5%; width: 110%; height: 110%;
      background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');
      background-size: cover; background-position: center; z-index: -3;
    }

    .glass-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border-radius: 40px;
      /* 關鍵：強制裁切，鎖死特效不出界 */
      overflow: hidden; 
      cursor: grab;
      background: transparent;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }
    .glass-container:active { cursor: grabbing; }

    /* 單一層級濾鏡，拒絕重影 */
    .glass-effect {
      position: absolute; inset: 0;
      backdrop-filter: url(#true-lens) saturate(130%);
      -webkit-backdrop-filter: url(#true-lens) saturate(130%);
    }

    .glass-frame {
      position: absolute; inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.4);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <svg class="hidden absolute w-0 h-0 pointer-events-none">
    <filter id="true-lens" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feImage id="lens-map" preserveAspectRatio="none" result="map" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="70" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="bg-complex-image"></div>

  <div id="drag-glass" class="glass-container">
    <div class="glass-effect"></div>
    <div class="glass-frame"></div>
  </div>

  <script>
    // ==========================================
    // 終極立方曲線透鏡生成器 (Cubic Lens Map)
    // ==========================================
    function generatePerfectLensMap(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(size, size);
      
      const cx = size / 2;
      const cy = size / 2;

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          // 將座標映射到 -1 ~ 1 之間
          const nx = (x - cx) / cx; 
          const ny = (y - cy) / cy; 
          
          // 【核心修正】: 放棄圓形算法，改用立方曲線
          // 這樣不僅覆蓋到四個死角，還能確保越靠邊緣拉扯力道越強！
          const pullX = Math.sign(nx) * Math.pow(Math.abs(nx), 1.5);
          const pullY = Math.sign(ny) * Math.pow(Math.abs(ny), 1.5);

          // 將拉扯數值轉換為 0~255 的 RGB 色彩 (中心=128=不扭曲)
          const r = Math.round((pullX * 0.5 + 0.5) * 255);
          const g = Math.round((pullY * 0.5 + 0.5) * 255);

          const i = (y * size + x) * 4;
          imgData.data[i] = Math.min(Math.max(r, 0), 255);     
          imgData.data[i+1] = Math.min(Math.max(g, 0), 255);   
          imgData.data[i+2] = 128; // B 色版無關緊要，維持中性
          imgData.data[i+3] = 255; // A 絕對不透明，避免破圖
        }
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL();
    }

    // 產生與 DOM 完全同尺寸 (300px) 的完美數學位移圖
    document.getElementById('lens-map').setAttribute('href', generatePerfectLensMap(300));

    // ==========================================
    // 拖曳邏輯
    // ==========================================
    const glass = document.getElementById('drag-glass');
    let isDragging = false, startX, startY, initialX, initialY;

    function getTranslateValues(element) {
      const style = window.getComputedStyle(element);
      const matrix = new DOMMatrixReadOnly(style.transform);
      return { x: matrix.m41, y: matrix.m42 };
    }

    function onStart(e) {
      isDragging = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const { x, y } = getTranslateValues(glass);
      startX = clientX; startY = clientY; initialX = x; initialY = y;
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      glass.style.transform = `translate(${initialX + (clientX - startX)}px, ${initialY + (clientY - startY)}px)`;
    }

    function onEnd() { isDragging = false; }

    glass.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    glass.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  </script>
</body>
</html>
