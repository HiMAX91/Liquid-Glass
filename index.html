<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>終極無縫折射版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; margin: 0; overflow: hidden; touch-action: none; }
    .bg-complex-image {
      position: absolute; inset: 0;
      background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');
      background-size: cover; background-position: center; z-index: -3;
    }

    .glass-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border-radius: 40px;
      overflow: hidden; 
      cursor: grab;
      /* 單一層級：確保絕對不會有分層重影 */
      background: transparent;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
    }
    
    /* 核心：單一圖層，透過 SVG 濾鏡內部運算進行「清晰-扭曲」的無縫漸變 */
    .glass-unified {
      position: absolute; inset: 0;
      backdrop-filter: url(#unified-lens) saturate(130%);
      -webkit-backdrop-filter: url(#unified-lens) saturate(130%);
    }

    .glass-frame {
      position: absolute; inset: 0;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: inset 1px 1px 2px rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <svg class="hidden absolute w-0 h-0 pointer-events-none">
    <filter id="unified-lens" x="-50%" y="-50%" width="200%" height="200%">
      <feTurbulence type="fractalNoise" baseFrequency="0.005" numOctaves="2" result="noise" />
      
      <feImage xlink:href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='300' height='300'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='30%25' stop-color='black' stop-opacity='0'/%3E%3Cstop offset='90%25' stop-color='white' stop-opacity='1'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='100%25' height='100%25' fill='url(%23g)'/%3E%3C/svg%3E" result="mask"/>
      
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="70" xChannelSelector="R" yChannelSelector="G" result="distorted" />
      
      <feComposite in="distorted" in2="mask" operator="in" result="edge_part"/>
      <feComposite in="SourceGraphic" in2="mask" operator="out" result="center_part"/>
      <feMerge>
        <feMergeNode in="center_part"/>
        <feMergeNode in="edge_part"/>
      </feMerge>
    </filter>
  </svg>

  <div class="bg-complex-image"></div>

  <div id="drag-glass" class="glass-container">
    <div class="glass-unified"></div> <div class="glass-frame"></div>    </div>

  <script>
    const glass = document.getElementById('drag-glass');
    let isDragging = false, startX, startY, initialX, initialY;

    function getTranslateValues(element) {
      const style = window.getComputedStyle(element);
      const matrix = new DOMMatrixReadOnly(style.transform);
      return { x: matrix.m41, y: matrix.m42 };
    }

    function onStart(e) {
      isDragging = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const { x, y } = getTranslateValues(glass);
      startX = clientX; startY = clientY; initialX = x; initialY = y;
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      glass.style.transform = `translate(${initialX + (clientX - startX)}px, ${initialY + (clientY - startY)}px)`;
    }

    function onEnd() { isDragging = false; }

    glass.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    glass.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  </script>
</body>
</html>
