<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>終極對稱・全透明液態透鏡</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #050505; margin: 0; overflow: hidden; touch-action: none; }
    
    .bg-complex-image {
      position: absolute; inset: -5%; width: 110%; height: 110%;
      background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');
      background-size: cover; background-position: center; z-index: -3;
    }

    .glass-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px;
      border-radius: 40px;
      overflow: hidden; 
      cursor: grab;
      background: transparent;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }
    .glass-container:active { cursor: grabbing; }

    .glass-effect {
      position: absolute; inset: 0;
      backdrop-filter: url(#true-lens) saturate(120%);
      -webkit-backdrop-filter: url(#true-lens) saturate(120%);
    }

    .glass-frame {
      position: absolute; inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.4);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <svg class="hidden absolute w-0 h-0 pointer-events-none">
    <filter id="true-lens" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feImage id="lens-map" x="-50%" y="-50%" width="200%" height="200%" preserveAspectRatio="none" result="map" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="90" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="bg-complex-image"></div>

  <div id="drag-glass" class="glass-container">
    <div class="glass-effect"></div>
    <div class="glass-frame"></div>
  </div>

  <script>
    // ==========================================
    // 防破圖、防不對稱的 200% 空間透鏡生成器
    // ==========================================
    function generatePerfectLensMap(containerSize, scaleMultiplier) {
      const size = containerSize * scaleMultiplier; // 產生 640x640 的畫布 (200%)
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(size, size);
      
      const cx = size / 2; // 中心點 320
      const cy = size / 2; 
      const radiusX = containerSize / 2; // 影響範圍限制在原始容器大小 160
      const radiusY = containerSize / 2;

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const dx = x - cx;
          const dy = y - cy;
          
          const nx = dx / radiusX; 
          const ny = dy / radiusY; 
          
          // 預設全部填滿 128 中性灰 (絕對不扭曲)
          let r = 128;
          let g = 128;

          // 只有在中央玻璃容器範圍內，才計算扭曲
          if (nx >= -1 && nx <= 1 && ny >= -1 && ny <= 1) {
             // 完美的平滑衰減函數：中心 1，邊緣 0。這能確保邊緣與外面 128 的灰色無縫接軌！
             const weight = Math.pow(1 - nx * nx, 1.2) * Math.pow(1 - ny * ny, 1.2);
             r = Math.round((nx * weight * 0.5 + 0.5) * 255);
             g = Math.round((ny * weight * 0.5 + 0.5) * 255);
          }

          const i = (y * size + x) * 4;
          imgData.data[i] = r;     
          imgData.data[i+1] = g;   
          imgData.data[i+2] = 128; 
          imgData.data[i+3] = 255; // Alpha 永遠填滿，杜絕透明黑的破圖
        }
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL();
    }

    // 容器大小 320，濾鏡擴張 2 倍
    document.getElementById('lens-map').setAttribute('href', generatePerfectLensMap(320, 2));

    // ==========================================
    // 拖曳邏輯
    // ==========================================
    const glass = document.getElementById('drag-glass');
    let isDragging = false, startX, startY, initialX, initialY;

    function getTranslateValues(element) {
      const style = window.getComputedStyle(element);
      const matrix = new DOMMatrixReadOnly(style.transform);
      return { x: matrix.m41, y: matrix.m42 };
    }

    function onStart(e) {
      isDragging = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const { x, y } = getTranslateValues(glass);
      startX = clientX; startY = clientY; initialX = x; initialY = y;
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      glass.style.transform = `translate(${initialX + (clientX - startX)}px, ${initialY + (clientY - startY)}px)`;
    }

    function onEnd() { isDragging = false; }

    glass.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    glass.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  </script>
</body>
</html>
