<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Real Refraction Drop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: #eee;
            /* 這是背景紋理，用來測試「扭曲感」 */
            background-image: 
                linear-gradient(45deg, #ccc 25%, transparent 25%), 
                linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #ccc 75%), 
                linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 40px 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .water-drop {
            position: relative;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            
            /* 關鍵：這行讓下面的東西產生扭曲感 */
            backdrop-filter: blur(2px) contrast(1.2) brightness(1.1) saturate(1.2);
            -webkit-backdrop-filter: blur(2px) contrast(1.2) brightness(1.1) saturate(1.2);

            /* 液態水滴形狀與動畫 */
            border-radius: 50%;
            box-shadow: 
                inset 10px 10px 20px rgba(255, 255, 255, 0.5), /* 內部高光 */
                inset -10px -10px 20px rgba(0, 0, 0, 0.1),    /* 內部陰影 */
                10px 20px 30px rgba(0, 0, 0, 0.2);            /* 外部投影 */
            
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: grab;
            transition: transform 0.1s;
        }

        /* 讓它有水滴跳動的感覺 */
        .water-drop:active {
            transform: scale(0.95) rotate(5deg);
            cursor: grabbing;
        }

        h1 {
            position: absolute;
            font-family: sans-serif;
            color: rgba(0,0,0,0.1);
            font-size: 5rem;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>

    <h1>LIQUID</h1>

    <div class="water-drop" id="drop"></div>

    <script>
        const drop = document.getElementById('drop');
        let isDragging = false;

        // 簡單的滑鼠跟隨，讓你測試「下面的扭曲感」
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX - 150;
            const y = e.clientY - 150;
            
            // 讓它帶有一點物理延遲感的移動
            drop.style.position = 'absolute';
            drop.style.left = x + 'px';
            drop.style.top = y + 'px';
            
            // 動態改變形狀，模擬移動時的液體擠壓
            const speedX = Math.abs(e.movementX);
            const r = 50 + (speedX * 0.5);
            drop.style.borderRadius = `${r}% ${100-r}% 50% 50%`;
        });
    </script>
</body>
</html>
