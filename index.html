<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>零破圖・完美液態玻璃</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #050505; margin: 0; overflow: hidden; touch-action: none; }
    
    .bg-complex-image {
      position: absolute; inset: -5%; width: 110%; height: 110%;
      background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');
      background-size: cover; background-position: center; z-index: -3;
    }

    .glass-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 320px; height: 320px;
      border-radius: 40px;
      overflow: hidden; 
      cursor: grab;
      background: transparent;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }
    .glass-container:active { cursor: grabbing; }

    .glass-effect {
      position: absolute; inset: 0;
      backdrop-filter: url(#true-lens) saturate(120%);
      -webkit-backdrop-filter: url(#true-lens) saturate(120%);
    }

    .glass-frame {
      position: absolute; inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: inset 1px 1px 1px rgba(255, 255, 255, 0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>

  <svg class="hidden absolute w-0 h-0 pointer-events-none">
    <filter id="true-lens" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feImage id="lens-map" x="-50%" y="-50%" width="200%" height="200%" preserveAspectRatio="none" result="map" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="120" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="bg-complex-image"></div>

  <div id="drag-glass" class="glass-container">
    <div class="glass-effect"></div>
    <div class="glass-frame"></div>
  </div>

  <script>
    // ==========================================
    // 零破圖：中性灰緩衝區透鏡生成器
    // ==========================================
    function generateFlawlessLensMap(baseSize) {
      // 1. 生成兩倍大的畫布作為安全緩衝區 (如果玻璃 320，畫布就是 640)
      const mapSize = baseSize * 2; 
      const canvas = document.createElement('canvas');
      canvas.width = mapSize; canvas.height = mapSize;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(mapSize, mapSize);
      
      const cx = mapSize / 2;
      const cy = mapSize / 2;
      const radius = baseSize / 2; // 扭曲效果被嚴格限制在原本玻璃的尺寸內

      // 2. 先把整張畫布塗滿 128 中性灰，並給予 255 絕對不透明度 (杜絕透明度造成的黑邊破圖)
      for (let i = 0; i < imgData.data.length; i += 4) {
        imgData.data[i] = 128;     // R (X 軸不偏移)
        imgData.data[i+1] = 128;   // G (Y 軸不偏移)
        imgData.data[i+2] = 128;   // B 
        imgData.data[i+3] = 255;   // A 
      }

      // 3. 只在安全半徑內計算扭曲
      for (let y = 0; y < mapSize; y++) {
        for (let x = 0; x < mapSize; x++) {
          const dx = x - cx;
          const dy = y - cy;
          const dist = Math.sqrt(dx*dx + dy*dy);

          // 只有距離中心小於半徑的像素才會產生扭曲
          if (dist <= radius) {
             // Cosine 平滑過渡：確保在接觸到 radius 邊緣時，數值完美降至 0
             const falloff = 0.5 * (Math.cos(Math.PI * (dist / radius)) + 1);
             
             // 計算向量方向
             const nx = dist === 0 ? 0 : dx / dist;
             const ny = dist === 0 ? 0 : dy / dist;

             // 結合曲線放大感與邊緣衰減
             const pull = Math.pow(dist / radius, 1.2) * falloff;

             const r = Math.round(128 + nx * pull * 127);
             const g = Math.round(128 + ny * pull * 127);

             const i = (y * mapSize + x) * 4;
             imgData.data[i] = Math.max(0, Math.min(255, r));
             imgData.data[i+1] = Math.max(0, Math.min(255, g));
          }
        }
      }
      
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL();
    }

    // 注入完美算圖 (玻璃尺寸 320)
    document.getElementById('lens-map').setAttribute('href', generateFlawlessLensMap(320));

    // ==========================================
    // 拖曳邏輯
    // ==========================================
    const glass = document.getElementById('drag-glass');
    let isDragging = false, startX, startY, initialX, initialY;

    function getTranslateValues(element) {
      const style = window.getComputedStyle(element);
      const matrix = new DOMMatrixReadOnly(style.transform);
      return { x: matrix.m41, y: matrix.m42 };
    }

    function onStart(e) {
      isDragging = true;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const { x, y } = getTranslateValues(glass);
      startX = clientX; startY = clientY; initialX = x; initialY = y;
    }

    function onMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      glass.style.transform = `translate(${initialX + (clientX - startX)}px, ${initialY + (clientY - startY)}px)`;
    }

    function onEnd() { isDragging = false; }

    glass.addEventListener('mousedown', onStart);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    glass.addEventListener('touchstart', onStart, { passive: false });
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('touchend', onEnd);
  </script>
</body>
</html>
