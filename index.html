<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>極限・無縫透鏡折射</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #000; overflow: hidden; touch-action: none; }
    .bg-complex-image {
      position: absolute; inset: -5%; width: 110%; height: 110%;
      background-image: url('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=2000&auto=format&fit=crop');
      background-size: cover; background-position: center;
    }
    .glass-container {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      border-radius: 40px;
      overflow: hidden; 
      cursor: grab;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.9);
      z-index: 10;
    }
    
    /* 關鍵：讓扭曲層溢位，在邊緣外就先算好過度 */
    .glass-effect {
      position: absolute; 
      inset: -60px; /* 這裡！向外溢位 60px，把破碎邊緣推到看不到的地方 */
      backdrop-filter: url(#lens) saturate(130%);
      -webkit-backdrop-filter: url(#lens) saturate(130%);
    }

    .glass-frame {
      position: absolute; inset: 0;
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <svg class="hidden">
    <filter id="lens" x="-50%" y="-50%" width="200%" height="200%">
      <feImage id="map" preserveAspectRatio="none" result="map" />
      <feDisplacementMap in="SourceGraphic" in2="map" scale="80" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <div class="bg-complex-image"></div>
  <div id="glass" class="glass-container">
    <div class="glass-effect"></div>
    <div class="glass-frame"></div>
  </div>

  <script>
    function generateMap(size) {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const data = ctx.createImageData(size, size);
      for(let i=0; i<data.data.length; i+=4) { data.data[i]=128; data.data[i+1]=128; data.data[i+2]=128; data.data[i+3]=255; }
      
      // 這裡計算球面折射，直接生成完整對稱的 map
      const r = size/2;
      for(let y=0; y<size; y++) {
        for(let x=0; x<size; x++) {
          const dx = x - r, dy = y - r;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < r) {
             const f = Math.sin((dist/r) * Math.PI/2);
             data.data[((y*size+x)*4)] = 128 + (dx/r)*f*127;
             data.data[((y*size+x)*4)+1] = 128 + (dy/r)*f*127;
          }
        }
      }
      ctx.putImageData(data, 0, 0);
      return canvas.toDataURL();
    }
    document.getElementById('map').setAttribute('href', generateMap(420));

    const g = document.getElementById('glass');
    let ox, oy, isD;
    window.onmousedown = (e) => { isD = true; ox = e.clientX - g.offsetLeft; oy = e.clientY - g.offsetTop; };
    window.onmousemove = (e) => { if(isD) { g.style.left = (e.clientX - ox) + 'px'; g.style.top = (e.clientY - oy) + 'px'; }};
    window.onmouseup = () => isD = false;
  </script>
</body>
</html>
